services:
  backend:
    build:
      context: ./backend
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_PATH: /app/data/todos.sqlite
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  backend-data:
